name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The package requires Emacs >= 29 (see Package-Requires).
        emacs_version:
          - '29.4'
          - '30.1'
          - snapshot
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install Eldev
        run: curl -fsSL https://raw.github.com/emacs-eldev/eldev/master/webinstall/github-eldev | sh

      # Byte-compile to surface warnings in the logs.  Not gated on warnings
      # because parts of this file are forked from upstream notmuch.el; add
      # `--warnings-as-errors` here once the file is warning-clean.
      - name: Byte-compile
        run: eldev -dtT compile

      # Resolves the notmuch dependency from MELPA, then runs the ERT suite
      # against the packaged project (-p), with backtraces on failure.
      - name: Run ERT tests
        run: eldev -p -dtT test
